<!-- templates/auth/register.html -->
{% extends "base.html" %}
{% block title %}Регистрация — SurveyApp{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Регистрация</h2>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="full_name">Имя</label>
                <input type="text" id="full_name" name="full_name"
                       value="{{ full_name if full_name is defined else '' }}"
                       placeholder="Ваше имя" required minlength="2">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       value="{{ email if email is defined else '' }}"
                       placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password"
                       placeholder="Минимум 6 символов" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
        </form>
        <p class="auth-footer">
            Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
